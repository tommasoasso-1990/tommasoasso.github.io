  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "name": "Tommaso Asso",
    "jobTitle": "Artist",
    "url": "https://tommasoasso.github.io",
    "email": "tommasoasso@gmail.com",

  <a href="#main-content" class="skip-link">Salta al contenuto</a>

  <aside class="sidebar">

      <!-- griglia generata via JS -->
      <section class="grid" id="works-grid"></section>
    </div>
  </main>

  <!-- lightbox condiviso -->
  <figure class="lightbox" id="lb" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Visualizzazione opera">
    <button class="nav-btn prev" aria-label="Opera precedente">←</button>
    <img alt="">
    <figcaption></figcaption>
    <button class="nav-btn next" aria-label="Opera successiva">→</button>
    <button class="lightbox-close" aria-label="Chiudi visualizzazione">&times;</button>
  </figure>

  <script src="js/works.js"></script>
  <script>
    // anno footer
    document.getElementById('year-it').textContent = new Date().getFullYear();

    // genera griglia + lightbox (IT: immagini nella stessa cartella)
    renderWorks({
      gridId: "works-grid",
      lightboxId: "lb",
      imgPrefix: ""        // perché index.html è nella root accanto a /images
    });
  </script>
