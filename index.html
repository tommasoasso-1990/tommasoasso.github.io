<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Opere — Tommaso Asso</title>
<style>
@font-face {
  font-family: "Union";
  src: url("fonts/Union-Regular.woff2") format("woff2");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Union";
  src: url("fonts/Union-Italic.woff2") format("woff2");
  font-weight: 400;
  font-style: italic;
  font-display: swap;
}
@font-face {
  font-family: "Union";
  src: url("fonts/Union-Bold.woff2") format("woff2");
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #0d0d0d;
  --white: #f7f7f5;
  --border: rgba(13,13,13,0.1);
  --sidebar-w: 220px;
}

html, body {
  height: 100%;
  background: var(--white);
  color: var(--black);
  font-family: "Union", system-ui, sans-serif;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 44px 36px 36px;
  border-right: 1px solid var(--border);
  background: var(--white);
  z-index: 10;
}

.brand {
  display: block;
  font-weight: 700;
  font-size: 1.15rem;
  line-height: 1.1;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
  margin-bottom: 56px;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}

.nav a {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
  padding: 7px 0;
  opacity: 0.35;
  border-bottom: 1px solid transparent;
  transition: opacity 0.2s, border-color 0.2s;
}
.nav a:hover,
.nav a.active { opacity: 1; border-bottom-color: var(--black); }

.sidebar-bottom {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.lang {
  display: flex;
  gap: 14px;
}
.lang a {
  font-size: 0.6rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--black);
  text-decoration: none;
  opacity: 0.3;
  transition: opacity 0.2s;
}
.lang a.active, .lang a:hover { opacity: 1; }

.site-footer {
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  opacity: 0.25;
}

/* ── MAIN ── */
.content {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
}

.page-title {
  font-weight: 400;
  font-style: italic;
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  opacity: 0.38;
  padding: 44px 72px 0;
  margin-bottom: 0;
}

/* ── LISTA OPERE ── */
.works-list {
  padding: 60px 0 120px;
}

.work-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 72px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}

.work-item:last-child {
  border-bottom: none;
}

.work-item:hover .work-img {
  opacity: 0.92;
}

.work-img {
  max-width: 680px;
  width: 100%;
  height: auto;
  display: block;
  transition: opacity 0.3s ease;
}

.work-caption {
  margin-top: 20px;
  text-align: left;
  width: 100%;
  max-width: 680px;
}

.work-caption strong {
  display: block;
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.work-caption .meta {
  display: block;
  font-weight: 400;
  font-style: italic;
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  opacity: 0.45;
  margin-top: 4px;
}

/* ── LIGHTBOX ── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13,13,13,0.97);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.lightbox.open { display: flex; }

.lightbox img {
  max-width: min(88vw, 1100px);
  max-height: 84vh;
  object-fit: contain;
  display: block;
  cursor: default;
}

.lightbox figcaption {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  white-space: nowrap;
}
.lightbox figcaption strong {
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--white);
  display: block;
}
.lightbox figcaption .meta {
  font-style: italic;
  font-size: 0.56rem;
  letter-spacing: 0.1em;
  color: rgba(247,247,245,0.38);
  margin-top: 4px;
}

.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: rgba(247,247,245,0.28);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 24px;
  transition: color 0.2s;
  line-height: 1;
  /* area tap più grande su mobile */
  min-width: 60px;
  min-height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:hover { color: var(--white); }
.nav-btn.prev { left: 12px; }
.nav-btn.next { right: 12px; }

.lb-close {
  position: absolute;
  top: 28px;
  right: 32px;
  background: none;
  border: none;
  color: rgba(247,247,245,0.28);
  font-family: "Union", sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
  padding: 8px;
}
.lb-close:hover { color: var(--white); }

.lb-counter {
  position: absolute;
  top: 28px;
  left: 32px;
  font-size: 0.56rem;
  letter-spacing: 0.14em;
  color: rgba(247,247,245,0.22);
}

/* ── RESPONSIVE ── */
@media (max-width: 960px) {
  .work-item { padding: 48px 48px; }
}

@media (max-width: 620px) {
  .sidebar {
    position: static;
    width: 100%;
    height: auto;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    padding: 18px 20px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .brand { margin-bottom: 0; font-size: 0.95rem; flex: 1; }
  .nav { flex-direction: row; flex: none; gap: 0; }
  .nav a { padding: 6px 10px; }
  .sidebar-bottom { flex-direction: row; gap: 16px; align-items: center; }
  .site-footer { display: none; }
  .content { margin-left: 0; }
  .page-title { padding: 28px 20px 0; }
  .work-item { padding: 40px 20px; }
  .nav-btn.prev { left: 0; }
  .nav-btn.next { right: 0; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <a class="brand" href="index.html">Tommaso<br>Asso</a>
  <nav class="nav">
    <a href="index.html" class="active">Opere</a>
    <a href="mostre.html">Mostre</a>
    <a href="info.html">Info</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="lang">
      <a class="active" href="index.html">IT</a>
      <a href="en/index.html">EN</a>
    </div>
    <div class="site-footer">© <span id="year"></span> Tommaso Asso</div>
  </div>
</aside>

<main class="content">
  <h1 class="page-title">Opere</h1>
  <div class="works-list" id="works-list"></div>
</main>

<figure class="lightbox" id="lb" aria-hidden="true">
  <span class="lb-counter" id="lb-counter"></span>
  <button class="lb-close" id="lb-close">Chiudi · esc</button>
  <button class="nav-btn prev" aria-label="Precedente">←</button>
  <img alt="">
  <figcaption></figcaption>
  <button class="nav-btn next" aria-label="Successiva">→</button>
</figure>

<script src="js/works.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();

const list    = document.getElementById('works-list');
const lb      = document.getElementById('lb');
const lbImg   = lb.querySelector('img');
const lbCap   = lb.querySelector('figcaption');
const lbCount = document.getElementById('lb-counter');
let current   = 0;

// genera lista opere
WORKS.forEach((work, idx) => {
  const item = document.createElement('div');
  item.className = 'work-item';

  const img = document.createElement('img');
  img.className = 'work-img';
  img.alt = `${work.title} — ${work.meta}`;
  img.src = `images/${work.file}`;
  img.loading = 'lazy';

  const cap = document.createElement('div');
  cap.className = 'work-caption';
  cap.innerHTML = `<strong>${work.title}</strong><span class="meta">${work.meta}</span>`;

  item.appendChild(img);
  item.appendChild(cap);
  item.addEventListener('click', () => openLB(idx));
  list.appendChild(item);
});

// lightbox
function openLB(idx) {
  current = idx;
  const w = WORKS[idx];
  lbImg.src = `images/${w.file}`;
  lbImg.alt = w.title;
  lbCap.innerHTML = `<strong>${w.title}</strong><span class="meta">${w.meta}</span>`;
  lbCount.textContent = `${idx + 1} / ${WORKS.length}`;
  lb.classList.add('open');
  lb.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  lb.classList.remove('open');
  lb.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

function step(dir) {
  current = (current + dir + WORKS.length) % WORKS.length;
  openLB(current);
}

lb.querySelector('.prev').addEventListener('click', e => { e.stopPropagation(); step(-1); });
lb.querySelector('.next').addEventListener('click', e => { e.stopPropagation(); step(+1); });
document.getElementById('lb-close').addEventListener('click', closeLB);
lb.addEventListener('click', e => { if (e.target === lb) closeLB(); });

// swipe mobile — soglia più alta per non confondersi col tap
let touchStartX = null;
let touchStartY = null;

lb.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

lb.addEventListener('touchend', e => {
  if (touchStartX === null) return;
  const dx = touchStartX - e.changedTouches[0].clientX;
  const dy = touchStartY - e.changedTouches[0].clientY;
  // solo swipe orizzontale deciso (>60px) e più orizzontale che verticale
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    step(dx > 0 ? 1 : -1);
  }
  touchStartX = null;
  touchStartY = null;
});

document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLB();
  if (e.key === 'ArrowRight') step(+1);
  if (e.key === 'ArrowLeft')  step(-1);
});
</script>
</body>
</html>
